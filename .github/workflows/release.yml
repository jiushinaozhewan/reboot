name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release

      - name: Prepare artifacts
        run: |
          mkdir artifacts
          copy target\release\reboot-agent.exe artifacts\
          copy target\release\reboot-client.exe artifacts\

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## 远程电源管理系统 ${{ github.ref_name }}

            ### 本次更新重点
            - 修复被控端托盘设置窗口重复打开时一闪而退的问题，连续修改端口和密钥更稳定
            - 收紧防重放安全策略，时间戳容忍窗口恢复为 ±60 秒，并补充认证失败封禁逻辑
            - 控制端支持为每个目标单独配置 Wake-on-LAN 广播地址，避免固定 `/24` 广播推导带来的误唤醒和唤醒失败
            - 清理误导性的 TLS 表述，明确当前版本适合部署在内网或 VPN 环境
            - 文档与配置说明同步更新，减少部署和排障歧义

            ### 下载文件
            - `reboot-agent.exe` - 被控端程序（安装在需要被远程控制的电脑上）
            - `reboot-client.exe` - 控制端程序（安装在你的控制电脑上）

            ### 使用方式
            1. 在被控端运行 `reboot-agent.exe`（需管理员权限）
            2. 在控制端运行 `reboot-client.exe`
            3. 在控制端配置目标 IP、端口、共享密钥，按需填写 WoL 广播地址
            4. 先测试连接获取 MAC 地址，再执行关机、重启或开机操作

            ### 部署提醒
            - 被控端需要开放防火墙端口（默认 7890）
            - WoL 功能需要在 BIOS 中启用 Wake-on-LAN
            - 当前版本未启用 TLS 链路加密，建议仅在可信内网或 VPN 中使用
            - 修改被控端端口或密钥后，建议立即同步更新控制端配置
          files: |
            artifacts/reboot-agent.exe
            artifacts/reboot-client.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
